name: Scrape BNA Cotizaciones

on:
  schedule:
    # Corre todos los dias a las 08:00 UTC (05:00 AM hora Argentina)
    - cron: "0 8 * * *"
  workflow_dispatch: # Permite correrlo manualmente desde el botón "Run workflow" en GitHub

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run scrape script
        run: python bna_divisa.py

      - name: Debug - Mostrar fecha y ultimas lineas CSV
        run: |
          echo "=== FECHA/HORA DEL SERVIDOR ==="
          date
          echo ""
          echo "=== Ultimas 5 lineas de bna_dolar_divisa_hist.csv ==="
          tail -5 bna_dolar_divisa_hist.csv || echo "Archivo no encontrado"
          echo ""
          echo "=== Ultimas 5 lineas de bna_divisa_hist.csv ==="
          tail -5 bna_divisa_hist.csv || echo "Archivo no encontrado"
          echo ""
          echo "=== Ultimas 5 lineas de bna_dolar_billete_hist.csv ==="
          tail -5 bna_dolar_billete_hist.csv || echo "Archivo no encontrado"
          echo ""
          echo "=== Git status ==="
          git status
          echo ""
          echo "=== Git diff (resumen) ==="
          git diff --stat

      - name: Commit and push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add *.csv *.xlsx *.sqlite *.db 2>/dev/null || true
          if git diff --staged --quiet; then
            echo "No hay cambios para commitear"
          else
            git commit -m "Auto-update: BNA Cotizaciones $(date +'%Y-%m-%d')"
            git push
          fi
